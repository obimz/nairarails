[build]
builder = "NIXPACKS"
buildCommand = "NODE_ENV=development pnpm install && pnpm --filter @nairarails/api build"

[deploy]
# start.sh: runs `prisma migrate deploy` then starts the server.
# Migrations are skipped automatically if already applied — safe to run on every deploy.
startCommand = "sh start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
